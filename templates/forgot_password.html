<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password — HireFlow Pro</title>
<link rel="stylesheet" href="/static/css/main.css">
<link rel="stylesheet" href="/static/css/auth.css">
</head>
<body class="auth-body">
<div class="auth-container">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-icon">🚀</div>
      <div class="logo-text">Hire<span>Flow</span><span class="logo-badge">PRO</span></div>
    </div>
    <h1 class="auth-title">Reset your password</h1>
    <p class="auth-subtitle">Enter your email and we'll send you a reset link</p>

    <div id="auth-error" class="auth-error" style="display:none"></div>
    <div id="auth-success" style="display:none;background:var(--green-lt);color:var(--green);border:1px solid rgba(5,150,105,.2);border-radius:10px;padding:10px 14px;font-size:13px;font-weight:500;margin-bottom:8px"></div>

    <!-- Step 1: Email form -->
    <form id="forgot-form" class="auth-form">
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" id="email" class="form-input" placeholder="you@example.com" required autocomplete="email">
      </div>
      <button type="submit" class="btn btn-primary auth-btn" id="submit-btn">
        <span id="btn-text">Send Reset Link</span>
        <span id="btn-loading" style="display:none">Sending...</span>
      </button>
    </form>

    <!-- Step 2: Reset link (demo mode) -->
    <div id="reset-link-section" style="display:none">
      <div style="background:var(--blue-lt);border:1px solid var(--blue-md);border-radius:10px;padding:14px;margin-top:16px">
        <div style="font-size:11px;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">Demo Mode — Reset Link</div>
        <div style="font-size:12px;color:var(--text2);margin-bottom:10px">In production, this link would be sent to your email. For now, click below:</div>
        <a id="reset-link" href="#" class="btn btn-primary btn-sm" style="width:100%;justify-content:center">Reset My Password</a>
      </div>
    </div>

    <p class="auth-footer">
      Remember your password? <a href="/login" class="auth-link">Sign in</a>
    </p>
  </div>
</div>

<script>
document.getElementById('forgot-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const errEl = document.getElementById('auth-error');
  const successEl = document.getElementById('auth-success');
  const btn = document.getElementById('submit-btn');
  errEl.style.display = 'none';
  successEl.style.display = 'none';
  btn.disabled = true;
  document.getElementById('btn-text').style.display = 'none';
  document.getElementById('btn-loading').style.display = 'inline';

  try {
    const res = await fetch('/api/auth/forgot-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: document.getElementById('email').value })
    });
    const data = await res.json();
    if (!res.ok) {
      errEl.textContent = data.error;
      errEl.style.display = 'block';
    } else {
      successEl.textContent = data.message;
      successEl.style.display = 'block';
      document.getElementById('forgot-form').style.display = 'none';

      // Show reset link in demo mode
      if (data.reset_link) {
        document.getElementById('reset-link').href = data.reset_link;
        document.getElementById('reset-link-section').style.display = 'block';
      }
    }
  } catch (err) {
    errEl.textContent = 'Something went wrong. Please try again.';
    errEl.style.display = 'block';
  } finally {
    btn.disabled = false;
    document.getElementById('btn-text').style.display = 'inline';
    document.getElementById('btn-loading').style.display = 'none';
  }
});
</script>
</body>
</html>
