<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — HireFlow Pro</title>
<link rel="stylesheet" href="/static/css/main.css">
<link rel="stylesheet" href="/static/css/auth.css">
</head>
<body class="auth-body">
<div class="auth-container">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-icon">🚀</div>
      <div class="logo-text">Hire<span>Flow</span><span class="logo-badge">PRO</span></div>
    </div>
    <h1 class="auth-title">Welcome back</h1>
    <p class="auth-subtitle">Sign in to your account to continue</p>

    <div id="auth-error" class="auth-error" style="display:none"></div>

    <form id="login-form" class="auth-form">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" id="email" class="form-input" placeholder="you@example.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" id="password" class="form-input" placeholder="Enter your password" required autocomplete="current-password">
      </div>
      <div style="display:flex;justify-content:flex-end;margin-top:-8px">
        <a href="/forgot-password" class="auth-link" style="font-size:12px">Forgot password?</a>
      </div>
      <button type="submit" class="btn btn-primary auth-btn" id="submit-btn">
        <span id="btn-text">Sign In</span>
        <span id="btn-loading" style="display:none">Signing in...</span>
      </button>
    </form>

    <p class="auth-footer">
      Don't have an account? <a href="/register" class="auth-link">Create one</a>
    </p>
  </div>
</div>

<script>
document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const errEl = document.getElementById('auth-error');
  const btn = document.getElementById('submit-btn');
  errEl.style.display = 'none';
  btn.disabled = true;
  document.getElementById('btn-text').style.display = 'none';
  document.getElementById('btn-loading').style.display = 'inline';

  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        email: document.getElementById('email').value,
        password: document.getElementById('password').value,
      })
    });
    const data = await res.json();
    if (!res.ok) {
      errEl.textContent = data.error;
      errEl.style.display = 'block';
    } else {
      window.location.href = '/dashboard';
    }
  } catch (err) {
    errEl.textContent = 'Something went wrong. Please try again.';
    errEl.style.display = 'block';
  } finally {
    btn.disabled = false;
    document.getElementById('btn-text').style.display = 'inline';
    document.getElementById('btn-loading').style.display = 'none';
  }
});
</script>
</body>
</html>
