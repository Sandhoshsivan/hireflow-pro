<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password — HireFlow Pro</title>
<link rel="stylesheet" href="/static/css/main.css">
<link rel="stylesheet" href="/static/css/auth.css">
</head>
<body class="auth-body">
<div class="auth-container">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-icon">🚀</div>
      <div class="logo-text">Hire<span>Flow</span><span class="logo-badge">PRO</span></div>
    </div>
    <h1 class="auth-title">Set new password</h1>
    <p class="auth-subtitle">Enter your new password below</p>

    <div id="auth-error" class="auth-error" style="display:none"></div>
    <div id="auth-success" style="display:none;background:var(--green-lt);color:var(--green);border:1px solid rgba(5,150,105,.2);border-radius:10px;padding:10px 14px;font-size:13px;font-weight:500;margin-bottom:8px"></div>

    <form id="reset-form" class="auth-form">
      <div class="form-group">
        <label class="form-label">New Password</label>
        <input type="password" id="password" class="form-input" placeholder="At least 8 characters" required minlength="8" autocomplete="new-password">
      </div>
      <div class="form-group">
        <label class="form-label">Confirm Password</label>
        <input type="password" id="confirm" class="form-input" placeholder="Confirm your password" required minlength="8" autocomplete="new-password">
      </div>
      <button type="submit" class="btn btn-primary auth-btn" id="submit-btn">
        <span id="btn-text">Reset Password</span>
        <span id="btn-loading" style="display:none">Resetting...</span>
      </button>
    </form>

    <p class="auth-footer">
      <a href="/login" class="auth-link">Back to Sign In</a>
    </p>
  </div>
</div>

<script>
const TOKEN = '{{ token }}';

document.getElementById('reset-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const errEl = document.getElementById('auth-error');
  const successEl = document.getElementById('auth-success');
  const btn = document.getElementById('submit-btn');
  errEl.style.display = 'none';
  successEl.style.display = 'none';

  const password = document.getElementById('password').value;
  const confirm = document.getElementById('confirm').value;

  if (password !== confirm) {
    errEl.textContent = 'Passwords do not match';
    errEl.style.display = 'block';
    return;
  }

  btn.disabled = true;
  document.getElementById('btn-text').style.display = 'none';
  document.getElementById('btn-loading').style.display = 'inline';

  try {
    const res = await fetch('/api/auth/reset-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token: TOKEN, password })
    });
    const data = await res.json();
    if (!res.ok) {
      errEl.textContent = data.error;
      errEl.style.display = 'block';
    } else {
      successEl.textContent = data.message;
      successEl.style.display = 'block';
      document.getElementById('reset-form').style.display = 'none';
      setTimeout(() => window.location.href = '/login', 2000);
    }
  } catch (err) {
    errEl.textContent = 'Something went wrong. Please try again.';
    errEl.style.display = 'block';
  } finally {
    btn.disabled = false;
    document.getElementById('btn-text').style.display = 'inline';
    document.getElementById('btn-loading').style.display = 'none';
  }
});
</script>
</body>
</html>
